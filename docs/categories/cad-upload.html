<!-- PDF.js loaded globally in index.html -->

<style>
  .cad-upload {
    font-family: inherit;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    overflow-x: hidden;
  }
  .cad-drop-zone {
    border: 3px dashed var(--border);
    padding: 40px;
    text-align: center;
    border-radius: 12px;
    background: var(--surface);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    margin-bottom: 16px;
  }
  .cad-drop-zone:hover,
  .cad-drop-zone.drag-over {
    background: var(--surface-alt);
    border-color: var(--primary);
  }
  .cad-drop-zone h3 { margin-bottom: 8px; }
  .cad-drop-zone p  { color: var(--text-secondary); font-size: 0.9rem; }
  .cad-file-item {
    display: flex;
    gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 6px 0;
    align-items: center;
    flex-wrap: wrap;
  }
  .cad-file-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    font-size: 0.88rem;
  }
  .cad-file-table th,
  .cad-file-table td {
    border-bottom: 1px solid var(--border);
    padding: 6px 8px; /* Slightly reduced padding */
    text-align: left;
    vertical-align: middle;
  }
  .cad-file-table thead th {
    background: var(--surface-alt);
    color: var(--text-primary);
    font-weight: 600;
  }
  .cad-file-table tbody tr:hover {
    background: var(--surface-alt);
  }
  .cad-file-table tfoot td {
    background: var(--surface-alt);
    font-weight: 700;
  }
  .cad-delete-x {
    background: var(--danger);
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px; /* Smaller button */
    height: 20px;
    min-width: 20px;
    min-height: 20px;
    aspect-ratio: 1 / 1;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    margin: 0 auto; /* Center button */
  }
  .cad-delete-x:hover { background: var(--danger-hover, #a52020); }
  .cad-file-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cad-file-size { color: var(--text-secondary); font-size: 0.85rem; white-space: nowrap; }
  .cad-qty-label { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  /* Łamanie długich nazw plików w tabeli */
  .cad-file-table tbody td:nth-child(2) { word-break: break-all; max-width: 250px; }
  .cad-qty-input {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 64px;
    font-size: 0.9rem;
  }
  .cad-file-price { font-weight: 600; white-space: nowrap; margin-left: auto; }
  .cad-table-input {
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 70px;
    font-size: 0.85rem;
  }
  .cad-table-checkbox {
    width: 16px;
    height: 16px;
  }
  .cad-scan-check {
    width: 16px;
    height: 16px;
  }
  .cad-warning {
    background: #fff3cd;
    border: 2px solid #ffc107;
    color: #856404;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .cad-summary {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-top: 16px;
  }
  .cad-summary p { margin-bottom: 8px; }
  .cad-total-val { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
  .cad-actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  /* ── Opcje globalne ────────────────────────────────────────── */
  .cad-options-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    gap: 8px 16px;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    width: 100%;
    box-sizing: border-box;
  }
  .cad-options-bar label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    white-space: nowrap;
    min-width: 0;
  }
  .cad-options-bar select {
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.85rem;
    background: var(--surface);
  }
  /* ── Skanowanie ────────────────────────────────────────────── */
  .cad-scan-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0 4px;
    font-size: 0.9rem;
  }
  .cad-scan-row input {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 100px;
    font-size: 0.9rem;
  }
  /* ── Wykrywanie formatu ────────────────────────────────────── */
  .cad-detect-btn {
    padding: 3px 8px;
    font-size: 0.8rem;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .cad-detect-btn:hover { background: var(--surface-alt); }
  .cad-format-badge {
    padding: 2px 8px;
    background: var(--primary, #22c55e);
    color: #fff;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    white-space: nowrap;
  }
  /* ── Tabela podsumowania ───────────────────────────────────── */
  .cad-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    font-size: 0.88rem;
  }
  .cad-table th,
  .cad-table td {
    border: 1px solid var(--border);
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }
  .cad-table th { background: var(--surface-alt); font-weight: 600; }
  .cad-table tfoot td {
    font-weight: 700;
    background: var(--surface-alt);
  }
  #grandTotal { font-size: 1.1rem; color: var(--primary); }

  /* ── TABELA WYNIKÓW (PDF + IMAGE) ──────────────────────────── */
  .results-table-container {
    margin-top: 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    padding: 0 10px 10px 10px;
  }
  .results-table {
    width: 100%;
    min-width: 0;
    max-width: 100%;
    border-collapse: collapse;
    font-size: 0.72rem;
    table-layout: fixed;
  }
  .results-table th {
    background: var(--surface-alt);
    color: var(--text-primary);
    font-weight: 600;
    padding: 3px 3px;
    text-align: left;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .results-table td {
    padding: 2px 3px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    overflow: hidden;
    max-width: 0;
  }

  .results-table .col-lp,
  .results-table .col-fold,
  .results-table .col-scan,
  .results-table .col-remove {
    text-align: center;
    white-space: nowrap;
  }

  .results-table .col-lp     { width: 4%; }
  .results-table .col-name   { width: 22%; }
  .results-table .col-size   { width: 25%; }
  .results-table .col-fold   { width: 12%; }
  .results-table .col-scan   { width: 7%; }
  .results-table .col-price  { width: 25%; }
  .results-table .col-remove { width: 5%; min-width: 40px; }

  .results-table .col-name,
  .results-table .col-size,
  .results-table .col-price {
    padding-left: 2px;
    padding-right: 2px;
  }

  .results-table th {
    white-space: nowrap;
  }

  .results-table td.col-name {
    word-break: break-word;
    overflow-wrap: anywhere;
    white-space: normal;
  }

  .results-table th.col-remove,
  .results-table td.col-remove {
    padding-left: 2px;
    padding-right: 2px;
  }

  .cad-size-main {
    font-weight: 700;
    white-space: nowrap;
    line-height: 1.05;
    font-size: 0.73rem;
  }

  .cad-size-dims {
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    line-height: 1.05;
    font-size: 0.72rem;
  }

  .cad-size-pages {
    white-space: nowrap;
    color: var(--text-secondary);
    line-height: 1.05;
    font-size: 0.7rem;
  }

  .cad-price-cell {
    display: grid;
    gap: 1px;
  }

  .cad-price-line {
    display: flex;
    justify-content: space-between;
    gap: 2px;
    white-space: nowrap;
    overflow: hidden;
    line-height: 1.05;
    font-size: 0.71rem;
  }

  .results-table td strong {
    line-height: 1.05;
  }

  #viewContainer .results-table th,
  #viewContainer .results-table td {
    padding: 2px 3px !important;
    font-size: 11px !important;
  }

  #viewContainer .results-table {
    border-collapse: collapse !important;
    border-spacing: 0 !important;
    border-radius: 8px !important;
  }

  #viewContainer .results-table-container {
    padding: 8px !important;
  }
  
  .results-table tbody tr:hover {
    background: var(--surface-alt);
  }
  .results-table tfoot {
    background: var(--surface-alt);
  }
  .results-table tfoot td {
    font-weight: 700;
    padding: clamp(8px, 1vw, 12px) clamp(8px, 1.2vw, 14px);
    border-top: 2px solid var(--border);
  }
  .results-table tfoot td[colspan] {
    text-align: right;
    padding-right: clamp(10px, 2vw, 24px);
  }
  .results-table tfoot td[id^="results-total"] {
    text-align: left;
    min-width: clamp(130px, 16vw, 190px);
    padding-left: clamp(8px, 1.5vw, 18px);
  }
  .results-table tfoot td strong {
    font-size: 1.04rem;
  }
  .results-table tfoot #results-total-color {
    font-size: 1.04rem;
    color: #ff6b35;
    font-weight: 800;
  }
  .results-table tfoot #results-total-bw {
    font-size: 1.04rem;
    color: #424242;
    font-weight: 800;
  }

  .results-table .cad-delete-x {
    width: 22px;
    height: 22px;
    min-width: 22px;
    min-height: 22px;
    border-radius: 999px;
    line-height: 1;
    font-size: 15px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }


  .results-total-live {
    padding: 16px;
    background: var(--surface-alt);
    border-radius: 0 0 8px 8px;
    font-weight: 700;
    text-align: center;
  }
  .results-total-live > div {
    margin: 6px 0;
    font-size: 1.05rem;
  }

  .summary-item {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.95rem;
  }
  .summary-item strong {
    font-weight: 700;
  }

  @media (max-width: 600px) {
    .results-table { font-size: 0.66rem; }
    .results-table th, .results-table td { padding: 1px 1px; }
    #viewContainer .results-table th,
    #viewContainer .results-table td {
      font-size: 10px !important;
      padding: 1px 1px !important;
    }
  }

  @media (max-width: 768px) {
    .cad-file-item { flex-direction: column; }
    .cad-file-price { margin-left: 0; margin-top: 8px; }
  }
  @media (max-width: 600px) {
    .cad-table { font-size: 0.78rem; }
    .cad-table th, .cad-table td { padding: 5px 6px; }
  }
  
  /* ── CSS GRID LAYOUT: Table + Explanation Side by Side ─────── */
  .main-calc-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }

  .calc-table-area {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .calc-explanation-area {
    background: #f0f8ff;
    border: 1px solid #d0e8ff;
    border-radius: 8px;
    padding: 15px;
    max-height: 600px;
    overflow-y: auto;
  }

  .calc-explanation-area h4 {
    margin: 0 0 12px 0;
    font-size: 0.95rem;
    color: var(--text-primary);
  }

  .obliczenie-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px;
    background: white;
    border-radius: 6px;
    border-left: 3px solid #007bff;
    margin-bottom: 8px;
    font-size: 0.85rem;
  }

  .obliczenie-item strong {
    color: var(--text-primary);
    font-size: 0.9rem;
  }

  .obliczenie-text {
    color: #666;
    font-size: 0.8rem;
    line-height: 1.3;
  }

  .obliczenie-cena {
    text-align: right;
    font-weight: 700;
    color: #007bff;
    font-size: 0.9rem;
  }

  @media (max-width: 1200px) {
    .main-calc-layout {
      grid-template-columns: 1fr;
    }
  }
  
  @media (max-width: 600px) {
    .calc-explanation-area {
      max-height: 400px;
    }
    .obliczenie-item {
      font-size: 0.75rem;
    }
  }
</style>

<div class="cad-upload">
  <h2>📄 CAD Upload – Wycena plików</h2>

  <!-- Opcje globalne -->
  <div class="cad-options-bar cad-options">
    <label>
      Druk:
      <select id="cadMode">
        <option value="color">🎨 Kolor</option>
        <option value="bw">⚫ Czarno-biały</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="optZapelnienie">
      Zapełnienie &gt;25% (+50%)
    </label>
    <label>
      <input type="checkbox" id="optPowieksz">
      Powiększanie (+50%)
    </label>
    <label>
      <input type="checkbox" id="optEmail">
      Email (+1 zł)
    </label>
  </div>

  <div class="cad-drop-zone" id="cadDropZone" role="button" tabindex="0"
       aria-label="Strefa przesyłania plików – kliknij lub przeciągnij pliki">
    <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"
         style="margin-bottom:12px;opacity:0.6" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
    </svg>
    <h3>Przeciągnij pliki tutaj</h3>
    <p>lub kliknij, aby wybrać (wiele plików naraz, max 50)</p>
    <input type="file" id="cadFileInput" multiple style="display:none"
           aria-label="Wybierz pliki CAD" />
  </div>

  <div id="cadWarning" class="cad-warning" role="alert" style="display:none">
    ⚠️ Dodano ponad 50 plików – sprawdź listę przed wyceną.
  </div>

  <div id="cadUploadStatus" class="cad-warning" role="status" style="display:none"></div>
  
  <!-- ✅ GŁÓWNY EKRAN: Tabela wyników (u góry) -->
  <div id="results-container" class="results-table-container" style="display:none;">
    <table id="resultsTable" class="results-table" aria-live="polite" aria-label="Wyniki analizy plików (PDF + obrazy)">
      <thead>
        <tr>
          <th class="col-lp">Lp.</th>
          <th class="col-name">Nazwa</th>
          <th class="col-size">Rozmiar</th>
          <th class="col-fold">Składanie</th>
          <th class="col-scan">Skan</th>
          <th class="col-price">Cena</th>
          <th class="col-remove">X</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
      <tfoot>
        <tr style="background:#fff3e0;">
          <td colspan="6"><strong>🎨 RAZEM KOLOR</strong></td>
          <td id="results-total-color">0,00 zł</td>
        </tr>
        <tr style="background:#f5f5f5;">
          <td colspan="6"><strong>⚫ RAZEM CZARNO-BIAŁE</strong></td>
          <td id="results-total-bw">0,00 zł</td>
        </tr>
      </tfoot>
    </table>

    <div class="cad-summary-section">
      <div class="cad-price-options" style="display: flex; gap: 12px; flex-wrap: wrap;">
        <button type="button" id="selectColor" class="btn-primary" style="display:none;">
          🎨 DODAJ DO KOSZYKA - Kolor: <strong id="selectColorPrice">0,00 zł</strong>
        </button>
        <button type="button" id="selectBw" class="btn-primary" style="display:none;">
          ⚫ DODAJ DO KOSZYKA - CZ-B: <strong id="selectBwPrice">0,00 zł</strong>
        </button>
      </div>
    </div>
  </div>

  <!-- Ekran obliczeń -->
  <div id="ekranObliczen" class="calc-explanation-area">
    <h4 style="margin-top:0; color:#333;">📈 Jak liczymy Twoją wycenę:</h4>
    <div id="obliczeniaLista"></div>
  </div>
</div>
