<h2>Druk CAD wielkoformatowy</h2>
<div class="form">
  <div class="cad-mode-format-row">
    <div>
      <label for="cad-mode">Tryb:</label>
      <select id="cad-mode">
        <option value="bw">Czarno-biały</option>
        <option value="color">Kolorowy</option>
      </select>
    </div>
  </div>

  <div class="row">
    <label for="cad-length">Długość (mm):</label>
    <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
      <div style="display:flex; align-items:center; gap:8px;">
        <label for="cad-format" style="margin:0; white-space:nowrap;">Format:</label>
        <select id="cad-format">
          <option value="A0p">A0+ (914 mm)</option>
          <option value="A0">A0 (841 mm)</option>
          <option value="A1">A1 (594 mm)</option>
          <option value="A2">A2 (420 mm)</option>
          <option value="A3">A3 (297 mm)</option>
        </select>
      </div>
      <input type="number" id="cad-length" value="1292" min="1">
      <button id="cad-use-base" class="secondary btn-use-base" style="white-space: nowrap; min-width: 120px;">Użyj bazowej</button>
    </div>
    <div id="cad-base-info" class="hint">Wymiar bazowy: 1292 mm</div>
  </div>

  <div class="row" id="qty-sheets-group">
    <label for="qty-sheets">Ilość arkuszy:</label>
    <input type="number" id="qty-sheets" value="1" min="1">
  </div>

  <!-- CAD Ops: składanie + skan wielkoformat -->
  <div class="row" id="cad-ops-section" style="flex-direction:column;gap:24px;margin-top:8px;">
    <h3 style="margin:0;font-size:1rem;font-weight:700;">🗂️ CAD Ops: Składanie / Skan wielkoformat</h3>
    <div style="display:flex;flex-wrap:wrap;gap:24px;">
      <div style="flex:1;min-width:200px;">
        <strong>Składanie</strong>
        <div class="row" style="margin-top:8px;">
          <label for="cad-fold-format">Format:</label>
          <select id="cad-fold-format">
            <option value="A0+">A0+</option>
            <option value="A0">A0</option>
            <option value="A1">A1</option>
            <option value="A2">A2</option>
            <option value="A3">A3</option>
            <option value="A3-poprzeczne">A3-poprzeczne</option>
          </select>
        </div>
        <div class="row" style="margin-top:8px;">
          <label for="cad-fold-qty">Ilość (szt):</label>
          <input type="number" id="cad-fold-qty" value="1" min="1" />
        </div>
        <button id="cad-fold-add" class="secondary" style="margin-top:8px; margin-bottom:12px;">Dodaj składanie</button>
      </div>
      <div style="flex:1;min-width:200px;">
        <strong>Skanowanie wielkoformatowe</strong>
        <div class="row" style="margin-top:8px;">
          <label for="cad-wf-scan-cm">Długość (cm):</label>
          <input type="number" id="cad-wf-scan-cm" placeholder="np. 110" min="1" step="0.1" />
        </div>
        <div class="row" style="margin-top:8px;">
          <label for="cad-wf-scan-qty">Ilość (szt):</label>
          <input type="number" id="cad-wf-scan-qty" value="1" min="1" />
        </div>
        <button id="cad-wf-scan-add" class="secondary" style="margin-top:8px; margin-bottom:12px;">Dodaj skan</button>
      </div>
    </div>
  </div>

  <div class="form-actions" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <button id="cad-calculate" class="btn-primary">Oblicz</button>
    <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:10px;min-width:220px;">
      <strong>RAZEM:</strong>
      <span id="cad-grand-total" style="font-size:18px;font-weight:900;color:#22c55e;">0.00 zł</span>
    </div>
    <button id="cad-add-to-cart" class="btn-success" disabled>Dodaj do listy</button>
  </div>

  <div id="cad-result-display" style="display: none; margin-top: 20px; padding: 14px; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 12px;">
    <div style="display: flex; justify-content: space-between;">
      <span id="cad-price-type">Cena formatowa:</span>
      <span id="cad-total-price" style="font-size: 18px; font-weight: 950; color: #22c55e;">-</span>
    </div>
    <div id="cad-express-hint" style="font-size: 12px; color: #f59e0b; display: none;">Zawiera dopłatę EXPRESS +20%</div>
  </div>

  <div id="cad-ops-list" style="display:none;margin-top:10px;padding:12px;background:rgba(59,130,246,0.09);border:1px solid rgba(59,130,246,0.32);border-radius:10px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <strong>Suma usług:</strong>
      <span id="cad-ops-total" style="font-weight:900;color:#3b82f6;">0.00 zł</span>
    </div>
    <strong>Dodane usługi:</strong>
    <div id="cad-ops-list-items" style="margin-top:6px;"></div>
  </div>
</div>
