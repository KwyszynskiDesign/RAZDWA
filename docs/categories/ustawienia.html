<h2>⚙️ Ustawienia – Panel cen</h2>
<div class="form">
  <p style="color: var(--text-secondary); font-size: 14px; margin-top: 0;">
    Zarządzaj cennikiem zapisanym lokalnie. Zmiany są widoczne natychmiast po zapisaniu.
  </p>

  <div id="categoryTabs" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">
    <!-- Tabs will be generated by JS -->
  </div>

  <div style="overflow-x: auto;">
    <table id="pricesTable" style="width: 100%; border-collapse: collapse; font-size: 14px;">
      <thead>
        <tr style="border-bottom: 2px solid var(--border);">
          <th style="text-align: left; padding: 8px 10px; color: var(--text-secondary); font-weight: 600;">Opis / klucz (kategoria-zakres)</th>
          <th style="text-align: left; padding: 8px 10px; color: var(--text-secondary); font-weight: 600;">Cena jednostkowa (zł)</th>
          <th style="padding: 8px 10px; width: 50px;"></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="form-actions" style="position: sticky; bottom: 0; z-index: 10; margin-top: 16px; background: var(--bg, #fff); padding: 10px 0; border-top: 1px solid var(--border, #8a9199);">
    <button id="addPriceBtn" class="btn-secondary">+ Dodaj pozycję</button>
    <button id="saveAllBtn" class="btn-primary">💾 Zapisz i odśwież</button>
    <button id="resetPricesBtn" class="btn-danger">🗑️ Przywróć domyślne</button>
  </div>

  <div id="ustawienia-msg" style="display: none; margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;"></div>
</div>

<script src="ustawienia.js"></script>
