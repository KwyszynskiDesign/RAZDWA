<div class="category-view" id="bk-view">
    <div class="view-header">
        <h2>Broszury i katalogi</h2>
    </div>

    <div class="calculator-form card">
        <div class="form-group">
            <label for="bk-format">Format:</label>
            <select id="bk-format" class="form-control">
                <option value="a4">A4</option>
                <option value="a5">A5</option>
                <option value="dl">DL</option>
            </select>
        </div>

        <div class="form-group">
            <label for="bk-pages">Liczba stron:</label>
            <select id="bk-pages" class="form-control">
                <option value="8">8 stron</option>
                <option value="12">12 stron</option>
                <option value="16">16 stron</option>
                <option value="20">20 stron</option>
                <option value="24">24 strony</option>
                <option value="32">32 strony</option>
                <option value="48">48 stron</option>
                <option value="64">64 strony</option>
            </select>
        </div>

        <div class="form-group">
            <label for="bk-qty">Nakład (szt.):</label>
            <input type="number" id="bk-qty" class="form-control" placeholder="np. 100" min="1" step="1" inputmode="numeric" autocomplete="off">
        </div>

        <div class="form-actions">
            <button id="bk-add-to-cart" class="btn-success" disabled>DODAJ DO KOSZYKA</button>
        </div>
    </div>

    <div id="bk-result-display" class="result-display card" style="display:none">
        <div class="result-row total">
            <span>SUMA ZA WSZYSTKO:</span>
            <span id="bk-total-price" class="price-value">-</span>
        </div>
        <hr>
        <div class="result-row">
            <span>Cena za szt.:</span>
            <span id="bk-unit-price" class="price-unit">-</span>
        </div>
        <div id="bk-express-hint" class="express-hint" style="display: none;">
            W tym dopłata EXPRESS +20%
        </div>
    </div>

    <div id="bk-breakdown-display" class="card" style="display: none; margin-top: 16px;">
        <h3 style="margin: 0 0 12px 0; font-size: 16px;">Jak liczona jest cena</h3>
        <div id="bk-breakdown-lines" style="display: grid; gap: 8px; font-size: 14px; line-height: 1.45; color:#334155;"></div>
    </div>
</div>
