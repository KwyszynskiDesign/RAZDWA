<div class="category-view" id="banner-view">
    <div class="view-header">
        <h2>Bannery</h2>
    </div>

    <div class="calculator-form card">
        <div class="form-group">
            <label for="b-material">Rodzaj:</label>
            <select id="b-material" class="form-control">
                <option value="powlekany">Banner powlekany</option>
                <option value="blockout">Banner Blockout</option>
            </select>
        </div>

        <div class="form-group">
            <label>Rozmiar banera (cm):</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="number" id="b-width" class="form-control" placeholder="Szerokość (np. 200)" min="1" step="0.1" inputmode="decimal" autocomplete="off">
                <span style="color: var(--muted);">×</span>
                <input type="number" id="b-height" class="form-control" placeholder="Wysokość (np. 100)" min="1" step="0.1" inputmode="decimal" autocomplete="off">
            </div>
            <div class="hint">Rozmiar wpisz w cm.</div>
        </div>

        <div class="form-group">
            <label for="b-area">Powierzchnia (m²):</label>
            <input type="number" id="b-area" class="form-control" placeholder="Wyliczy się automatycznie z rozmiaru" min="0.1" step="0.01" inputmode="decimal" autocomplete="off" readonly>
            <div id="b-computed-area-info" class="hint" style="margin-top:6px;">Wyliczona powierzchnia: -</div>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="b-oczkowanie">
            <label for="b-oczkowanie">Oczkowanie (+2.50 zł/m2)</label>
        </div>

        <div class="form-actions">
            <button id="b-calculate" class="btn-primary">Oblicz</button>
            <button id="b-add-to-cart" class="btn-success" disabled>Dodaj do koszyka</button>
        </div>
    </div>

    <div id="b-result-display" class="result-display card" style="display: none;">
        <div class="result-row">
            <span>Cena za m²:</span>
            <span id="b-unit-price" class="price-unit">-</span>
        </div>
        <div class="result-row">
            <span>Cena łączna:</span>
            <span id="b-total-price" class="price-value">-</span>
        </div>
        <div id="b-express-hint" class="express-hint" style="display: none;">
            W tym dopłata EXPRESS +20%
        </div>
    </div>

    <div id="b-breakdown-display" class="card" style="display: none; margin-top: 16px;">
        <h3 style="margin: 0 0 12px 0; font-size: 16px;">Jak liczona jest cena</h3>
        <div id="b-breakdown-lines" style="display: grid; gap: 8px; font-size: 14px; line-height: 1.45;"></div>
    </div>
</div>
