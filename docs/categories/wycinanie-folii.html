<h2>Wycinanie z folii</h2>
<div class="form">
  <div class="row">
    <label>Wymiary (mm):</label>
    <div style="display: flex; gap: 10px; align-items: center;">
      <input type="number" id="wf-width" placeholder="Szerokość (np. 1000)" min="1" step="1" inputmode="numeric" autocomplete="off">
      <span style="color: var(--muted);">×</span>
      <input type="number" id="wf-height" placeholder="Wysokość (np. 1000)" min="1" step="1" inputmode="numeric" autocomplete="off">
    </div>
  </div>

  <div class="row">
    <label>Rodzaj folii:</label>
    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 10px;">
      <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="checkbox" id="wf-gold" class="wf-foil-type" value="zlota" style="width: 18px; height: 18px; cursor: pointer;">
        <span>Złota</span>
      </label>
      <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="checkbox" id="wf-silver" class="wf-foil-type" value="srebrna" style="width: 18px; height: 18px; cursor: pointer;">
        <span>Srebrna</span>
      </label>
      <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="checkbox" id="wf-custom" class="wf-foil-type" value="custom" style="width: 18px; height: 18px; cursor: pointer;">
        <span>Inny kolor (wpisz poniżej):</span>
      </label>
      <input type="text" id="wf-color" placeholder="Wpisz kolor" autocomplete="off" style="margin-left: 26px;">
    </div>
  </div>



  <div class="form-actions">
    <button id="wf-add-to-cart" class="btn-success" disabled>DODAJ DO KOSZYKA</button>
  </div>

  <div id="wf-result" style="margin-top: 20px; padding: 14px; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 12px;">
    <div style="display: flex; justify-content: space-between; font-weight: 900; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
      <span>SUMA ZA WSZYSTKO:</span>
      <span id="wf-total" style="font-size: 18px; color: #22c55e;">-</span>
    </div>
  </div>

  <div id="wf-breakdown-display" class="card" style="margin-top: 16px;">
    <h3 style="margin: 0 0 12px 0; font-size: 16px;">Jak liczona jest cena</h3>
    <div style="display: grid; gap: 8px; font-size: 14px; line-height: 1.45;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
        <span>Powierzchnia:</span>
        <span id="wf-area">-</span>
      </div>
      <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
        <span>Cena za m2:</span>
        <span id="wf-unit">-</span>
      </div>
      <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; color: var(--muted);">
        <span>Kwota minimalna:</span>
        <span>30.00 zł</span>
      </div>
      <div id="wf-express" style="font-size: 12px; color: #f59e0b; display: none; margin-top: 5px;">Zawiera dopłatę EXPRESS +20%</div>
      <div style="font-size: 12px; color: var(--muted); margin-top: 8px;">Cena zawiera: folia + wycinanie + wybieranie + transport.</div>
    </div>
  </div>
</div>
