<h2>Wycinanie z folii</h2>
<div class="form">
  <div class="row">
    <label for="wf-variant">Rodzaj folii:</label>
    <select id="wf-variant">
      <option value="kolorowa">Folia kolorowa</option>
      <option value="zloto-srebro">Folia złoto / srebro</option>
    </select>
  </div>

  <div class="row">
    <label>Wymiary (mm):</label>
    <div style="display: flex; gap: 10px; align-items: center;">
      <input type="number" id="wf-width" placeholder="Szerokość (np. 1000)" min="1" step="1" inputmode="numeric" autocomplete="off">
      <span style="color: var(--muted);">×</span>
      <input type="number" id="wf-height" placeholder="Wysokość (np. 1000)" min="1" step="1" inputmode="numeric" autocomplete="off">
    </div>
  </div>

  <div class="row">
    <label>Kolor:</label>
    <input type="text" id="wf-color" placeholder="Wpisz kolor" autocomplete="off">
  </div>

  <div class="row">
    <label>Dodatkowe opcje:</label>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="wf-silver" style="width: 18px; height: 18px; cursor: pointer;">
        <label for="wf-silver" style="margin: 0; cursor: pointer;">Srebrna</label>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="wf-gold" style="width: 18px; height: 18px; cursor: pointer;">
        <label for="wf-gold" style="margin: 0; cursor: pointer;">Złota</label>
      </div>
    </div>
    <div style="display: flex; gap: 8px; margin-top: 12px;">
      <button id="wf-add-silver" class="btn-secondary" style="background: #a8a9ad; color: #fff; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; flex: 1;">Dodaj srebrną</button>
      <button id="wf-add-gold" class="btn-secondary" style="background: #d4af37; color: #333; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; flex: 1;">Dodaj złotą</button>
    </div>
  </div>

  <div class="form-actions">
    <button id="wf-calculate" class="btn-primary">Oblicz</button>
    <button id="wf-add-to-cart" class="btn-success" disabled>DODAJ DO KOSZYKA</button>
  </div>

  <div id="wf-result" style="display: none; margin-top: 20px; padding: 14px; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 12px;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
      <span>Powierzchnia:</span>
      <span id="wf-area">-</span>
    </div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
      <span>Cena za m2:</span>
      <span id="wf-unit">-</span>
    </div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; color: var(--muted);">
      <span>Kwota minimalna:</span>
      <span>30.00 zł</span>
    </div>
    <div style="display: flex; justify-content: space-between; font-weight: 900; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
      <span>Cena całkowita:</span>
      <span id="wf-total" style="font-size: 18px; color: #22c55e;">-</span>
    </div>
    <div id="wf-express" style="font-size: 12px; color: #f59e0b; display: none; margin-top: 5px;">Zawiera dopłatę EXPRESS +20%</div>
    <div style="font-size: 12px; color: var(--muted); margin-top: 8px;">Cena zawiera: folia + wycinanie + wybieranie + transport.</div>
  </div>
</div>
