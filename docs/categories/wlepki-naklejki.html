<div class="category-view" id="wlepki-view">
    <div class="view-header">
        <h2>Wlepki / Naklejki</h2>
    </div>

    <div class="calculator-form card">
        <div class="form-group">
            <label for="wlepki-mode">Tryb wyceny:</label>
            <select id="wlepki-mode" class="form-control">
                <option value="m2">Wlepki / naklejki (m²)</option>
                <option value="szt">Folia/Papier samoprzylepne (szt)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="wlepki-group">Rodzaj:</label>
            <select id="wlepki-group" class="form-control">
                <option value="wlepki_obrys_folia">Wlepki po obrysie (Folia Biała/Trans)</option>
                <option value="wlepki_polipropylen">Wlepki po obrysie - Polipropylen</option>
                <option value="wlepki_standard_folia">Folia Biała / Transparentna (standard)</option>
            </select>
        </div>

        <div class="form-group" id="wlepki-piece-group" style="display:none;">
            <label for="wlepki-piece-table">Tabela sztukowa:</label>
            <select id="wlepki-piece-table" class="form-control">
                <option value="papier-sra3">Papier SRA3 (papier z klejem mat/błysk)</option>
                <option value="folia-sra3">Folia SRA3 (folia biała / bezbarwna)</option>
                <option value="plotowane-papier">Plotowane + cięte na sztuki (papier)</option>
                <option value="plotowane-folia">Plotowane + cięte na sztuki (folia)</option>
            </select>

            <div id="wlepki-piece-paper-group" style="display:none; margin-top: 12px;">
                <label>Wykończenie papieru:</label>
                <div class="checkbox-group" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 10px;">
                    <label class="wlepki-option">
                        <input type="checkbox" value="mat" class="wlepki-piece-paper wlepki-option-input">
                        <span class="wlepki-option-text">Papier mat</span>
                    </label>
                    <label class="wlepki-option">
                        <input type="checkbox" value="blysk" class="wlepki-piece-paper wlepki-option-input">
                        <span class="wlepki-option-text">Papier błysk</span>
                    </label>
                </div>
            </div>

            <div id="wlepki-piece-foil-group" style="display:none; margin-top: 12px;">
                <label>Rodzaj folii:</label>
                <div class="checkbox-group" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 10px;">
                    <label class="wlepki-option">
                        <input type="checkbox" value="biala" class="wlepki-piece-foil wlepki-option-input">
                        <span class="wlepki-option-text">Folia biała</span>
                    </label>
                    <label class="wlepki-option">
                        <input type="checkbox" value="transparentna" class="wlepki-piece-foil wlepki-option-input">
                        <span class="wlepki-option-text">Folia transparentna</span>
                    </label>
                </div>
            </div>

            <label for="wlepki-piece-qty" style="margin-top:10px;">Ilość (szt):</label>
            <input type="number" id="wlepki-piece-qty" class="form-control" value="1" min="1" step="1">
            <small class="form-text">Dostępne progi: 1-10, 15, 20, 25, 30 szt.</small>
        </div>

        <div class="form-group" id="wlepki-area-foil-group" style="display:none;">
            <label>Rodzaj folii:</label>
            <div class="checkbox-group" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 10px;">
                <label class="wlepki-option">
                    <input type="checkbox" value="biala" class="wlepki-area-foil wlepki-option-input">
                    <span class="wlepki-option-text">Folia biała</span>
                </label>
                <label class="wlepki-option">
                    <input type="checkbox" value="transparentna" class="wlepki-area-foil wlepki-option-input">
                    <span class="wlepki-option-text">Folia transparentna</span>
                </label>
            </div>
            <small class="form-text" style="display: block; margin-top: 10px;">Informacja techniczna do zamówienia (nie zmienia ceny).</small>
        </div>

        <div class="form-group" id="wlepki-area-group">
            <label for="wlepki-area">Powierzchnia (m2):</label>
            <input type="number" id="wlepki-area" class="form-control" value="1" min="0.1" step="0.1">
            <small class="form-text">Minimalnie 1m2 (minimalka).</small>
        </div>

        <div class="form-group modifiers-list" id="wlepki-modifiers-group">
            <label>Opcje dodatkowe:</label>
            <div class="checkbox-group" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 10px;">
                <label class="wlepki-option">
                    <input type="checkbox" value="mocny_klej" class="wlepki-mod wlepki-option-input">
                    <span class="wlepki-option-text">Mocny klej <strong class="wlepki-option-price">(+12%)</strong></span>
                </label>
                <label class="wlepki-option">
                    <input type="checkbox" value="arkusze" class="wlepki-mod wlepki-option-input">
                    <span class="wlepki-option-text">Cięte na arkusze <strong class="wlepki-option-price">(+2 zł/m²)</strong></span>
                </label>
                <label class="wlepki-option">
                    <input type="checkbox" value="pojedyncze" class="wlepki-mod wlepki-option-input">
                    <span class="wlepki-option-text">Cięte na pojedyncze <strong class="wlepki-option-price">(+10 zł/m²)</strong></span>
                </label>
            </div>
            <small class="form-text" style="display: block; margin-top: 10px;">Najpierw liczona jest cena bazowa za m², potem dopłaty (np. +12%, +2 zł/m²).</small>
        </div>

        <div class="form-actions">
            <button id="btn-calculate" class="btn-primary">Oblicz</button>
            <button id="btn-add-to-cart" class="btn-success" disabled>DODAJ DO KOSZYKA</button>
        </div>
    </div>

    <div id="wlepki-result" class="result-display card" style="display: none;">
        <div class="result-row">
            <span id="wlepki-unit-label">Cena za m2:</span>
            <span id="unit-price" class="price-value">0,00 zł</span>
        </div>
        <div class="result-row">
            <span id="wlepki-base-label">Baza (rozliczone m²):</span>
            <span id="base-price" class="price-value">0,00 zł</span>
        </div>
        <div id="modifiers-breakdown" style="margin-top: 8px;"></div>
        <div class="result-row total">
            <span>Cena całkowita:</span>
            <span id="total-price" class="price-value">0,00 zł</span>
        </div>
    </div>
</div>

<style>
    #wlepki-view .checkbox-group {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
        margin-top: 10px;
    }

    #wlepki-view .wlepki-option {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 52px;
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid rgba(0, 100, 148, 0.18);
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        color: var(--text-primary);
    }

    #wlepki-view .wlepki-option:hover {
        background: var(--surface-alt) !important;
        border-color: rgba(0, 100, 148, 0.35);
        box-shadow: 0 4px 12px rgba(0, 100, 148, 0.08);
    }

    #wlepki-view .wlepki-option:has(input:checked) {
        background: rgba(0, 100, 148, 0.10) !important;
        border: 1px solid var(--primary);
        box-shadow: inset 0 0 0 1px rgba(0, 100, 148, 0.08);
    }

    #wlepki-view .wlepki-option-input {
        width: 18px;
        height: 18px;
        margin: 0;
        cursor: pointer;
        accent-color: var(--primary);
        flex: 0 0 auto;
    }

    #wlepki-view .wlepki-option-text {
        color: var(--text-primary);
        font-weight: 500;
    }

    #wlepki-view .wlepki-option-price {
        color: var(--primary);
        font-weight: 700;
    }

    #wlepki-view .checkbox-group label:hover {
        background: var(--surface-alt) !important;
    }
    
    @media (max-width: 768px) {
        #wlepki-view .checkbox-group {
            grid-template-columns: 1fr !important;
        }
    }
</style>
